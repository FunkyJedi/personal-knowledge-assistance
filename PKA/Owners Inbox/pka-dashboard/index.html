<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PKA Command Center</title>
<style>
/* ============================================================
   DESIGN TOKENS
   4px grid. Inter font stack. Deliberate palette.
   ============================================================ */
:root {
  /* Spacing (4px grid) */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;
  --sp-12: 48px; --sp-16: 64px;

  /* Typography */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --text-xs: 11px; --text-sm: 13px; --text-base: 14px;
  --text-md: 15px; --text-lg: 18px; --text-xl: 22px; --text-2xl: 28px;
  --leading-tight: 1.25; --leading-normal: 1.5; --leading-relaxed: 1.65;
  --weight-normal: 400; --weight-medium: 500; --weight-semibold: 600; --weight-bold: 700;

  /* Radii */
  --radius-sm: 4px; --radius-md: 6px; --radius-lg: 10px; --radius-xl: 14px; --radius-full: 9999px;

  /* Shadows */
  --shadow-xs: 0 1px 2px rgba(0,0,0,.04);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.04);
  --shadow-focus: 0 0 0 2px var(--accent-alpha);

  /* Transitions */
  --ease-out: cubic-bezier(.2, .8, .2, 1);
  --ease-spring: cubic-bezier(.34, 1.56, .64, 1);
  --dur-fast: 120ms; --dur-normal: 200ms; --dur-slow: 350ms;

  /* Sidebar */
  --sidebar-width: 240px;
  --sidebar-collapsed: 56px;
}

/* LIGHT THEME */
[data-theme="light"] {
  --bg-app: #f7f7f8;
  --bg-surface: #ffffff;
  --bg-surface-hover: #fafafa;
  --bg-surface-active: #f3f3f5;
  --bg-muted: #f3f3f5;
  --bg-sidebar: #fafafa;
  --border: #e8e8ec;
  --border-light: #f0f0f3;
  --text-primary: #1a1a22;
  --text-secondary: #6b6b80;
  --text-tertiary: #9b9bb0;
  --text-inverse: #ffffff;
  --accent: #5b5bd6;
  --accent-hover: #4c4cbf;
  --accent-alpha: rgba(91,91,214,.15);
  --accent-surface: rgba(91,91,214,.06);
  --status-pending: #e8a317;
  --status-pending-bg: rgba(232,163,23,.1);
  --status-active: #30a46c;
  --status-active-bg: rgba(48,164,108,.1);
  --status-completed: #30a46c;
  --status-completed-bg: rgba(48,164,108,.1);
  --status-cancelled: #dc3d43;
  --status-cancelled-bg: rgba(220,61,67,.08);
  --status-info: #3b82f6;
  --status-info-bg: rgba(59,130,246,.08);
  --priority-urgent: #dc3d43;
  --priority-high: #e8a317;
  --priority-normal: #6b6b80;
  --priority-low: #9b9bb0;
  --chart-1: #5b5bd6;
  --chart-2: #30a46c;
  --chart-3: #e8a317;
  --chart-4: #3b82f6;
  --scrollbar-thumb: rgba(0,0,0,.12);
  --scrollbar-track: transparent;
}

/* DARK THEME */
[data-theme="dark"] {
  --bg-app: #111113;
  --bg-surface: #191a1f;
  --bg-surface-hover: #1e1f25;
  --bg-surface-active: #25262d;
  --bg-muted: #1e1f25;
  --bg-sidebar: #16171b;
  --border: #2a2b33;
  --border-light: #222330;
  --text-primary: #ededef;
  --text-secondary: #9b9bb0;
  --text-tertiary: #6b6b80;
  --text-inverse: #111113;
  --accent: #7c7ce0;
  --accent-hover: #9090e8;
  --accent-alpha: rgba(124,124,224,.2);
  --accent-surface: rgba(124,124,224,.08);
  --status-pending: #f0b833;
  --status-pending-bg: rgba(240,184,51,.12);
  --status-active: #3dd68c;
  --status-active-bg: rgba(61,214,140,.1);
  --status-completed: #3dd68c;
  --status-completed-bg: rgba(61,214,140,.1);
  --status-cancelled: #f16a6e;
  --status-cancelled-bg: rgba(241,106,110,.1);
  --status-info: #60a5fa;
  --status-info-bg: rgba(96,165,250,.1);
  --priority-urgent: #f16a6e;
  --priority-high: #f0b833;
  --priority-normal: #9b9bb0;
  --priority-low: #6b6b80;
  --chart-1: #7c7ce0;
  --chart-2: #3dd68c;
  --chart-3: #f0b833;
  --chart-4: #60a5fa;
  --scrollbar-thumb: rgba(255,255,255,.1);
  --scrollbar-track: transparent;
  --shadow-xs: 0 1px 2px rgba(0,0,0,.2);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.15);
  --shadow-md: 0 4px 12px rgba(0,0,0,.3), 0 1px 3px rgba(0,0,0,.15);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.15);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--font);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
  color: var(--text-primary);
  background: var(--bg-app);
  overflow: hidden;
  height: 100vh;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: var(--radius-full); }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb); }

/* ============================================================
   LAYOUT
   ============================================================ */
.app { display: flex; height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: width var(--dur-slow) var(--ease-out), min-width var(--dur-slow) var(--ease-out);
  overflow: hidden;
  z-index: 10;
}

.sidebar-header {
  padding: var(--sp-5) var(--sp-5) var(--sp-3);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  min-height: 60px;
}

.sidebar-logo {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: var(--weight-bold); font-size: var(--text-sm);
  flex-shrink: 0;
  letter-spacing: -.5px;
}

.sidebar-title {
  font-size: var(--text-md);
  font-weight: var(--weight-semibold);
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
}

.sidebar-subtitle {
  font-size: var(--text-xs);
  color: var(--text-tertiary);
  white-space: nowrap;
  overflow: hidden;
}

.sidebar-nav {
  flex: 1;
  padding: var(--sp-2) var(--sp-3);
  overflow-y: auto;
}

.nav-section-label {
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: .6px;
  padding: var(--sp-4) var(--sp-2) var(--sp-2);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--dur-fast) ease;
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  white-space: nowrap;
  user-select: none;
  position: relative;
}

.nav-item:hover { background: var(--bg-surface-active); color: var(--text-primary); }
.nav-item.active { background: var(--accent-alpha); color: var(--accent); }
.nav-item.active .nav-icon { color: var(--accent); }

.nav-icon {
  width: 18px; height: 18px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary);
  transition: color var(--dur-fast) ease;
}

.nav-item:hover .nav-icon { color: var(--text-secondary); }

.nav-badge {
  margin-left: auto;
  background: var(--accent-alpha);
  color: var(--accent);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  padding: 1px 6px;
  border-radius: var(--radius-full);
  min-width: 18px;
  text-align: center;
}

/* Sidebar footer */
.sidebar-footer {
  padding: var(--sp-3) var(--sp-4);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.theme-toggle {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--radius-md);
  background: var(--bg-muted);
  border: none;
  cursor: pointer;
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  transition: all var(--dur-fast) ease;
  width: 100%;
  justify-content: center;
}
.theme-toggle:hover { background: var(--bg-surface-active); color: var(--text-primary); }

/* MAIN CONTENT */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.topbar {
  height: 52px;
  min-height: 52px;
  display: flex;
  align-items: center;
  padding: 0 var(--sp-6);
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  gap: var(--sp-4);
}

.topbar-title {
  font-size: var(--text-lg);
  font-weight: var(--weight-semibold);
  color: var(--text-primary);
}

.topbar-subtitle {
  font-size: var(--text-sm);
  color: var(--text-tertiary);
  margin-left: var(--sp-2);
}

.topbar-spacer { flex: 1; }

.topbar-search {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--radius-md);
  background: var(--bg-muted);
  border: 1px solid transparent;
  color: var(--text-tertiary);
  font-size: var(--text-sm);
  cursor: text;
  transition: all var(--dur-fast) ease;
  min-width: 200px;
}
.topbar-search:focus-within {
  background: var(--bg-surface);
  border-color: var(--accent);
  box-shadow: var(--shadow-focus);
}
.topbar-search input {
  border: none;
  background: none;
  outline: none;
  color: var(--text-primary);
  font-family: var(--font);
  font-size: var(--text-sm);
  width: 100%;
}
.topbar-search input::placeholder { color: var(--text-tertiary); }

.content {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-6);
}

/* ============================================================
   DASHBOARD
   ============================================================ */
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: var(--sp-4);
  margin-bottom: var(--sp-8);
}

.stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--sp-5);
  transition: all var(--dur-normal) var(--ease-out);
  cursor: pointer;
}
.stat-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.stat-label {
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: var(--sp-2);
}

.stat-value {
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  color: var(--text-primary);
  line-height: var(--leading-tight);
}

.stat-detail {
  font-size: var(--text-xs);
  color: var(--text-secondary);
  margin-top: var(--sp-1);
}

/* Section headers */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-4);
}

.section-title {
  font-size: var(--text-md);
  font-weight: var(--weight-semibold);
  color: var(--text-primary);
}

.section-action {
  font-size: var(--text-sm);
  color: var(--accent);
  cursor: pointer;
  font-weight: var(--weight-medium);
  transition: color var(--dur-fast) ease;
}
.section-action:hover { color: var(--accent-hover); }

/* Activity timeline */
.timeline {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.timeline-item {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-3);
  padding: var(--sp-4) var(--sp-5);
  border-bottom: 1px solid var(--border-light);
  transition: background var(--dur-fast) ease;
}
.timeline-item:last-child { border-bottom: none; }
.timeline-item:hover { background: var(--bg-surface-hover); }

.timeline-dot {
  width: 8px; height: 8px;
  border-radius: var(--radius-full);
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 6px;
}

.timeline-content { flex: 1; min-width: 0; }

.timeline-actor {
  font-weight: var(--weight-semibold);
  color: var(--text-primary);
  font-size: var(--text-sm);
}

.timeline-action {
  color: var(--text-secondary);
  font-size: var(--text-sm);
}

.timeline-detail {
  font-size: var(--text-xs);
  color: var(--text-tertiary);
  margin-top: var(--sp-1);
  line-height: var(--leading-relaxed);
}

.timeline-time {
  font-size: var(--text-xs);
  color: var(--text-tertiary);
  flex-shrink: 0;
  white-space: nowrap;
}

/* Two-column layout for dashboard bottom */
.dashboard-columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-6);
  margin-top: var(--sp-6);
}

@media (max-width: 900px) {
  .dashboard-columns { grid-template-columns: 1fr; }
}

/* ============================================================
   TABLE VIEWS
   ============================================================ */
.table-container {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.table-toolbar {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--border-light);
}

.table-filter {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-1) var(--sp-3);
  border-radius: var(--radius-full);
  background: var(--bg-muted);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  color: var(--text-secondary);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--dur-fast) ease;
  font-family: var(--font);
}
.table-filter:hover { border-color: var(--border); background: var(--bg-surface); }
.table-filter.active { border-color: var(--accent); background: var(--accent-alpha); color: var(--accent); }

.data-table {
  width: 100%;
  border-collapse: collapse;
}

.data-table th {
  text-align: left;
  padding: var(--sp-3) var(--sp-4);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-muted);
  position: sticky;
  top: 0;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.data-table th:hover { color: var(--text-secondary); }
.data-table th .sort-indicator { margin-left: var(--sp-1); opacity: .4; }
.data-table th.sorted .sort-indicator { opacity: 1; color: var(--accent); }

.data-table td {
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--border-light);
  font-size: var(--text-sm);
  color: var(--text-primary);
  vertical-align: middle;
}

.data-table tr { transition: background var(--dur-fast) ease; cursor: pointer; }
.data-table tbody tr:hover { background: var(--bg-surface-hover); }
.data-table tbody tr:last-child td { border-bottom: none; }

/* ============================================================
   BADGES & STATUS
   ============================================================ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-1);
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  white-space: nowrap;
  line-height: 1.6;
}

.badge-pending { background: var(--status-pending-bg); color: var(--status-pending); }
.badge-active, .badge-picked_up, .badge-assigned, .badge-in_progress { background: var(--status-info-bg); color: var(--status-info); }
.badge-completed, .badge-done, .badge-approved, .badge-processed { background: var(--status-completed-bg); color: var(--status-completed); }
.badge-cancelled, .badge-rejected, .badge-inactive { background: var(--status-cancelled-bg); color: var(--status-cancelled); }
.badge-on_hold, .badge-research, .badge-candidate_ready, .badge-pending_approval { background: var(--status-pending-bg); color: var(--status-pending); }

.badge-priority-urgent { background: rgba(220,61,67,.1); color: var(--priority-urgent); }
.badge-priority-high { background: rgba(232,163,23,.1); color: var(--priority-high); }
.badge-priority-normal { background: var(--bg-muted); color: var(--priority-normal); }
.badge-priority-low { background: var(--bg-muted); color: var(--priority-low); }

.badge-tag {
  background: var(--accent-surface);
  color: var(--accent);
  font-size: 10px;
  padding: 1px 6px;
}

/* ============================================================
   DETAIL PANEL (SLIDE-IN)
   ============================================================ */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.3);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur-normal) ease;
}
.detail-overlay.visible { opacity: 1; pointer-events: all; }

.detail-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: min(560px, 90vw);
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  z-index: 101;
  transform: translateX(100%);
  transition: transform var(--dur-slow) var(--ease-out);
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
}
.detail-panel.visible { transform: translateX(0); }

.detail-header {
  display: flex;
  align-items: center;
  padding: var(--sp-4) var(--sp-6);
  border-bottom: 1px solid var(--border);
  gap: var(--sp-3);
  min-height: 56px;
}

.detail-close {
  width: 28px; height: 28px;
  border-radius: var(--radius-md);
  border: none;
  background: var(--bg-muted);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--dur-fast) ease;
  flex-shrink: 0;
  font-size: var(--text-base);
}
.detail-close:hover { background: var(--bg-surface-active); color: var(--text-primary); }

.detail-title {
  font-size: var(--text-lg);
  font-weight: var(--weight-semibold);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-6);
}

.detail-section {
  margin-bottom: var(--sp-6);
}

.detail-section-title {
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: var(--sp-3);
}

.detail-field {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: var(--sp-2);
  padding: var(--sp-2) 0;
  border-bottom: 1px solid var(--border-light);
  font-size: var(--text-sm);
}
.detail-field:last-child { border-bottom: none; }

.detail-field-label {
  color: var(--text-tertiary);
  font-weight: var(--weight-medium);
}
.detail-field-value {
  color: var(--text-primary);
  word-break: break-word;
}

.detail-notes {
  background: var(--bg-muted);
  border-radius: var(--radius-md);
  padding: var(--sp-4);
  font-size: var(--text-sm);
  line-height: var(--leading-relaxed);
  color: var(--text-secondary);
  white-space: pre-wrap;
  max-height: 300px;
  overflow-y: auto;
}

/* Sub-table in detail view */
.detail-subtable {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--text-sm);
}
.detail-subtable th {
  text-align: left;
  padding: var(--sp-2) var(--sp-3);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  color: var(--text-tertiary);
  border-bottom: 1px solid var(--border);
}
.detail-subtable td {
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--border-light);
  color: var(--text-primary);
}
.detail-subtable tr:last-child td { border-bottom: none; }

/* ============================================================
   TEAM MEMBER CARDS
   ============================================================ */
.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: var(--sp-4);
}

.team-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--sp-5);
  transition: all var(--dur-normal) var(--ease-out);
  cursor: pointer;
}
.team-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.team-card-header {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin-bottom: var(--sp-3);
}

.team-avatar {
  width: 40px; height: 40px;
  border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  font-weight: var(--weight-bold);
  font-size: var(--text-md);
  color: white;
  flex-shrink: 0;
}

.team-card-name {
  font-weight: var(--weight-semibold);
  font-size: var(--text-md);
  color: var(--text-primary);
}

.team-card-role {
  font-size: var(--text-xs);
  color: var(--text-secondary);
}

.team-card-specialty {
  font-size: var(--text-xs);
  color: var(--text-tertiary);
  line-height: var(--leading-relaxed);
}

/* ============================================================
   EMPTY STATES
   ============================================================ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--sp-16) var(--sp-8);
  text-align: center;
}

.empty-state-icon {
  width: 48px; height: 48px;
  border-radius: var(--radius-lg);
  background: var(--bg-muted);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: var(--sp-4);
  font-size: 24px;
  color: var(--text-tertiary);
}

.empty-state-title {
  font-size: var(--text-md);
  font-weight: var(--weight-semibold);
  color: var(--text-secondary);
  margin-bottom: var(--sp-2);
}

.empty-state-desc {
  font-size: var(--text-sm);
  color: var(--text-tertiary);
  max-width: 320px;
}

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(.96); }
  to { opacity: 1; transform: scale(1); }
}

.animate-in {
  animation: fadeIn var(--dur-normal) var(--ease-out) both;
}

.stagger-1 { animation-delay: 30ms; }
.stagger-2 { animation-delay: 60ms; }
.stagger-3 { animation-delay: 90ms; }
.stagger-4 { animation-delay: 120ms; }
.stagger-5 { animation-delay: 150ms; }
.stagger-6 { animation-delay: 180ms; }

/* Page transition */
.view-container {
  animation: fadeIn var(--dur-normal) var(--ease-out) both;
}

/* ============================================================
   UTILITY
   ============================================================ */
.text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.text-mono { font-family: var(--font-mono); font-size: var(--text-xs); }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

/* Focus visible for keyboard nav */
*:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

.hidden { display: none !important; }
</style>

/* ============================================================

const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

function escapeHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function formatDate(str) {
  if (!str) return '\u2014';
  const d = new Date(str.replace(' ', 'T'));
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatTime(str) {
  if (!str) return '';
  const d = new Date(str.replace(' ', 'T'));
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function formatDateTime(str) {
  if (!str) return '\u2014';
  return formatDate(str) + ' at ' + formatTime(str);
}

function timeAgo(str) {
  if (!str) return '';
  const now = new Date('2026-03-25T15:00:00');
  const d = new Date(str.replace(' ', 'T'));
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function badge(status) {
  if (!status) return '';
  const cls = 'badge badge-' + status.replace(/\s+/g, '_');
  return `<span class="${cls}">${escapeHtml(status)}</span>`;
}

function priorityBadge(p) {
  if (!p) return '';
  return `<span class="badge badge-priority-${p}">${escapeHtml(p)}</span>`;
}

// Avatar color from name
const avatarColors = ['#5b5bd6', '#30a46c', '#e8a317', '#3b82f6', '#dc3d43', '#8b5cf6', '#06b6d4', '#f97316'];
function avatarColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return avatarColors[Math.abs(hash) % avatarColors.length];
}

function actionLabel(action) {
  const map = {
    'team_initialized': 'initialized the team',
    'research_completed': 'completed research',
    'meeting_logged': 'logged a meeting',
    'candidate_created': 'created a candidate profile',
    'hire_approved': 'approved a hire',
    'member_onboarded': 'onboarded a member',
    'task_created': 'created a task',
    'task_updated': 'updated a task',
    'delivered_work': 'delivered work',
    'projects_created': 'created projects',
    'tasks_created': 'created tasks',
    'knowledge_stored': 'stored knowledge',
  };
  return map[action] || action.replace(/_/g, ' ');
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function navigate(view) {
  state.currentView = view;
  state.searchQuery = '';
  $('#globalSearch').value = '';

  // Update nav
  $$('.nav-item').forEach(el => {
    const isActive = el.dataset.view === view;
    el.classList.toggle('active', isActive);
    el.setAttribute('aria-current', isActive ? 'page' : 'false');
  });

  // Update topbar
  const titles = {
    dashboard: ['Dashboard', ''],
    tasks: ['Tasks', `${DB.tasks.length} total`],
    projects: ['Projects', `${DB.projects.length} total`],
    team: ['Team', `${DB.team_members.length} members`],
    knowledge: ['Knowledge Base', `${DB.knowledge_entries.length} entries`],
    meetings: ['Meetings', `${DB.meetings.length} total`],
    inbox: ['Inbox', `${DB.inbox_items.length} items`],
    hiring: ['Hiring Pipeline', `${DB.hiring_pipeline.length} entries`],
    activity: ['Activity Log', `${DB.activity_log.length} events`],
  };
  const [title, sub] = titles[view] || [view, ''];
  $('#topbarTitle').textContent = title;
  $('#topbarSubtitle').textContent = sub;

  renderView(view);
}

// Wire up nav items
document.addEventListener('DOMContentLoaded', () => {
  $$('.nav-item').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.view));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navigate(el.dataset.view); }});
  });

  // Theme toggle
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const saved = localStorage.getItem('pka-theme');
  if (saved === 'dark' || (!saved && prefersDark)) setTheme('dark');

  $('#themeToggle').addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    setTheme(next);
  });

  // Detail panel close
  $('#detailClose').addEventListener('click', closeDetail);
  $('#detailOverlay').addEventListener('click', closeDetail);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

  // Global search
  $('#globalSearch').addEventListener('input', e => {
    state.searchQuery = e.target.value.toLowerCase();
    renderView(state.currentView);
  });

  // Set nav badges
  updateBadges();

  // Initial render
  navigate('dashboard');
});

function setTheme(theme) {
  document.documentElement.dataset.theme = theme;
  localStorage.setItem('pka-theme', theme);
  $('#themeLabel').textContent = theme === 'dark' ? 'Light mode' : 'Dark mode';
  const icon = theme === 'dark'
    ? '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  $('#themeIcon').innerHTML = icon;
}

function updateBadges() {
  const set = (id, count) => { const el = $(`#${id}`); if (el) { el.textContent = count || ''; el.classList.toggle('hidden', !count); }};
  set('badgeTasks', DB.tasks.length);
  set('badgeProjects', DB.projects.length);
  set('badgeTeam', DB.team_members.length);
  set('badgeKnowledge', DB.knowledge_entries.length);
  set('badgeMeetings', DB.meetings.length);
  set('badgeInbox', DB.inbox_items.filter(i => i.status === 'pending').length);
  set('badgeHiring', DB.hiring_pipeline.filter(h => h.stage !== 'approved' && h.stage !== 'rejected').length);
  set('badgeActivity', DB.activity_log.length);
}

/* ============================================================
   TEAM
   ============================================================ */
function renderTeam() {
  const members = filterBySearch(DB.team_members, ['name', 'role', 'specialty', 'status']);
  return `

          <div class="team-card-header">
            <div class="team-avatar" style="background:${avatarColor(m.name)}">${m.name[0]}</div>
            <div>
              <div class="team-card-name">${escapeHtml(m.name)}</div>

            </div>

function showTeamMemberDetail(id) {

        <div style="font-size:var(--text-sm);color:var(--text-secondary)">${escapeHtml(m.role)}</div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Profile</div>
      <div class="detail-field"><span class="detail-field-label">Status</span><span class="detail-field-value">${badge(m.status)}</span></div>
      <div class="detail-field"><span class="detail-field-label">Specialty</span><span class="detail-field-value">${escapeHtml(m.specialty)}</span></div>
      <div class="detail-field"><span class="detail-field-label">Profile</span><span class="detail-field-value text-mono">${escapeHtml(m.profile_path)}</span></div>
      <div class="detail-field"><span class="detail-field-label">Hired</span><span class="detail-field-value">${formatDateTime(m.hired_at)}</span></div>

        <table class="detail-subtable">
          <thead><tr><th>Title</th><th>Status</th><th>Priority</th></tr></thead>
          <tbody>${memberTasks.map(t => `<tr><td>${escapeHtml(t.title)}</td><td>${badge(t.status)}</td><td>${priorityBadge(t.priority)}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    ` : ''}
    ${memberActions.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Action Items (${memberActions.length})</div>
        <table class="detail-subtable">
          <thead><tr><th>Description</th><th>Status</th></tr></thead>
          <tbody>${memberActions.map(a => `<tr><td>${escapeHtml(a.description)}</td><td>${badge(a.status)}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    ` : ''}
    ${memberActivity.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Activity (${memberActivity.length})</div>
        ${memberActivity.slice().reverse().map(a => `
          <div style="padding:var(--sp-2) 0;border-bottom:1px solid var(--border-light);font-size:var(--text-sm)">
            <span style="color:var(--text-secondary)">${actionLabel(a.action)}</span>
            <div style="font-size:var(--text-xs);color:var(--text-tertiary);margin-top:2px">${escapeHtml(a.details)}</div>

/* ============================================================
   KNOWLEDGE
   ============================================================ */
function renderKnowledge() {
  const entries = filterBySearch(DB.knowledge_entries, ['title', 'content', 'type', 'domain', 'source']);
  if (entries.length === 0) {
    return emptyState('Knowledge base is empty', 'Documents, insights, learnings, decisions, and references will be stored here as the team grows.');
  }
  return `
    <div class="table-container animate-in">
      <table class="data-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Type</th>
            <th>Domain</th>
            <th>Status</th>
            <th>Created By</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
          ${entries.map(e => {
            const tags = DB.knowledge_tags.filter(t => t.entry_id === e.id);
            return `
              <tr onclick="showKnowledgeDetail(${e.id})">
                <td>
                  <strong>${escapeHtml(e.title)}</strong>
                  ${tags.length ? '<div style="margin-top:4px">' + tags.map(t => `<span class="badge badge-tag">${escapeHtml(t.tag)}</span>`).join(' ') + '</div>' : ''}
                </td>
                <td>${badge(e.type)}</td>
                <td>${escapeHtml(e.domain) || '\u2014'}</td>
                <td>${badge(e.status)}</td>
                <td>${escapeHtml(e.created_by) || '\u2014'}</td>
                <td class="text-mono">${formatDate(e.created_at)}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function showKnowledgeDetail(id) {
  const e = DB.knowledge_entries.find(x => x.id === id);
  if (!e) return;
  const tags = DB.knowledge_tags.filter(t => t.entry_id === e.id);
  const linksFrom = DB.knowledge_links.filter(l => l.from_entry_id === e.id);
  const linksTo = DB.knowledge_links.filter(l => l.to_entry_id === e.id);
  openDetail(e.title, `
    <div class="detail-section">
      <div class="detail-section-title">Details</div>
      <div class="detail-field"><span class="detail-field-label">Type</span><span class="detail-field-value">${badge(e.type)}</span></div>
      <div class="detail-field"><span class="detail-field-label">Domain</span><span class="detail-field-value">${escapeHtml(e.domain) || '\u2014'}</span></div>
      <div class="detail-field"><span class="detail-field-label">Status</span><span class="detail-field-value">${badge(e.status)}</span></div>
      <div class="detail-field"><span class="detail-field-label">Source</span><span class="detail-field-value">${escapeHtml(e.source) || '\u2014'}</span></div>
      <div class="detail-field"><span class="detail-field-label">Created By</span><span class="detail-field-value">${escapeHtml(e.created_by) || '\u2014'}</span></div>
      <div class="detail-field"><span class="detail-field-label">Created</span><span class="detail-field-value">${formatDateTime(e.created_at)}</span></div>
      ${tags.length ? `<div class="detail-field"><span class="detail-field-label">Tags</span><span class="detail-field-value">${tags.map(t => `<span class="badge badge-tag">${escapeHtml(t.tag)}</span>`).join(' ')}</span></div>` : ''}
    </div>
    ${e.content ? `<div class="detail-section"><div class="detail-section-title">Content</div><div class="detail-notes">${escapeHtml(e.content)}</div></div>` : ''}
    ${linksFrom.length || linksTo.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Links</div>
        ${linksFrom.map(l => {
          const target = DB.knowledge_entries.find(x => x.id === l.to_entry_id);
          return `<div style="padding:var(--sp-2) 0;font-size:var(--text-sm)"><span class="badge badge-tag">${l.relationship}</span> ${target ? escapeHtml(target.title) : 'Entry #' + l.to_entry_id}</div>`;
        }).join('')}
        ${linksTo.map(l => {
          const source = DB.knowledge_entries.find(x => x.id === l.from_entry_id);
          return `<div style="padding:var(--sp-2) 0;font-size:var(--text-sm)">${source ? escapeHtml(source.title) : 'Entry #' + l.from_entry_id} <span class="badge badge-tag">${l.relationship}</span> this</div>`;
        }).join('')}
      </div>
    ` : ''}
  `);
}

/* ============================================================
   MEETINGS
   ============================================================ */
function renderMeetings() {
  const meetings = filterBySearch(DB.meetings, ['title', 'attendees', 'notes']);
  if (meetings.length === 0) {
    return emptyState('No meetings logged', 'Meeting records with notes, attendees, and action items will appear here.');
  }
  return `
    <div class="table-container animate-in">
      <table class="data-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Date</th>
            <th>Attendees</th>
            <th>Action Items</th>
          </tr>
        </thead>
        <tbody>
          ${meetings.map(m => {
            const actions = DB.meeting_action_items.filter(a => a.meeting_id === m.id);
            const pending = actions.filter(a => a.status === 'pending').length;
            return `
              <tr onclick="showMeetingDetail(${m.id})">
                <td><strong>${escapeHtml(m.title)}</strong></td>
                <td class="text-mono">${formatDate(m.meeting_date)}</td>
                <td>${escapeHtml(m.attendees)}</td>
                <td>${actions.length} total${pending ? `, <span style="color:var(--status-pending)">${pending} pending</span>` : ''}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function showMeetingDetail(id) {
  const m = DB.meetings.find(x => x.id === id);
  if (!m) return;
  const actions = DB.meeting_action_items.filter(a => a.meeting_id === m.id);
  const project = m.project_id ? DB.projects.find(p => p.id === m.project_id) : null;
  openDetail(m.title, `
    <div class="detail-section">
      <div class="detail-section-title">Details</div>
      <div class="detail-field"><span class="detail-field-label">Date</span><span class="detail-field-value">${formatDate(m.meeting_date)}</span></div>
      <div class="detail-field"><span class="detail-field-label">Attendees</span><span class="detail-field-value">${escapeHtml(m.attendees)}</span></div>
      ${project ? `<div class="detail-field"><span class="detail-field-label">Project</span><span class="detail-field-value">${escapeHtml(project.name)}</span></div>` : ''}
      <div class="detail-field"><span class="detail-field-label">Logged</span><span class="detail-field-value">${formatDateTime(m.created_at)}</span></div>
    </div>
    ${m.notes ? `<div class="detail-section"><div class="detail-section-title">Notes</div><div class="detail-notes">${escapeHtml(m.notes)}</div></div>` : ''}

      <div class="detail-section">
        <div class="detail-section-title">Action Items (${actions.length})</div>
        <table class="detail-subtable">
          <thead><tr><th>Description</th><th>Assigned To</th><th>Status</th><th>Due</th></tr></thead>

/* ============================================================

/* ============================================================
   ACTIVITY LOG
   ============================================================ */
function renderActivity() {
  const items = filterBySearch(DB.activity_log, ['actor', 'action', 'details', 'target_type']);
  if (items.length === 0) {
    return emptyState('No activity yet', 'All team actions are logged here automatically.');

  return `
    <div class="timeline animate-in">
      ${items.slice().reverse().map(a => `
        <div class="timeline-item">
          <div class="timeline-dot" style="background:${avatarColor(a.actor)}"></div>
          <div class="timeline-content">
            <span class="timeline-actor">${escapeHtml(a.actor)}</span>
            <span class="timeline-action">${actionLabel(a.action)}</span>
            <div class="timeline-detail">${escapeHtml(a.details)}</div>

/* ============================================================
   DETAIL PANEL
   ============================================================ */
function openDetail(title, bodyHtml) {
  $('#detailTitle').textContent = title;
  $('#detailBody').innerHTML = bodyHtml;
  $('#detailOverlay').classList.add('visible');
  $('#detailPanel').classList.add('visible');
  // Trap focus
  $('#detailClose').focus();
}

function closeDetail() {
  $('#detailOverlay').classList.remove('visible');
  $('#detailPanel').classList.remove('visible');
}

/* ============================================================
   SEARCH FILTER
   ============================================================ */
function filterBySearch(data, fields) {
  const q = state.searchQuery;
  if (!q) return data;
  return data.filter(item =>
    fields.some(f => item[f] && String(item[f]).toLowerCase().includes(q))
  );
}

/* ============================================================
   EMPTY STATE HELPER
   ============================================================ */
function emptyState(title, desc) {
  return `
    <div class="empty-state animate-in">
      <div class="empty-state-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="empty-state-title">${title}</div>
      <div class="empty-state-desc">${desc}</div>
    </div>
  `;
}
